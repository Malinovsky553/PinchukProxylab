<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход в систему</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      color: #1f2937;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #1f2937;
      color: white;
      border: none;
      cursor: pointer;
    }
    .error {
      color: red;
      margin-bottom: 12px;
    }
    .note {
      margin-top: 16px;
      font-size: 14px;
      color: #4b5563;
      background: #eef2ff;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Авторизация</h1>

    {{if .Error}}
      <div class="error">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/login">
      <input type="text" name="username" placeholder="Логин">
      <input type="password" name="password" placeholder="Пароль">
      <button type="submit">Войти</button>
    </form>

    <div class="note">
      <b>Тестовые учетные записи:</b><br>
      admin / admin123<br>
      user / user123
    </div>
  </div>
</body>
</html>

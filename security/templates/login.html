<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Вход в систему</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background: #f4f6f8;
			margin: 0;
			padding: 30px;
		}
		.container {
			max-width: 420px;
			margin: 60px auto;
			background: white;
			padding: 25px;
			border-radius: 12px;
			box-shadow: 0 0 12px rgba(0,0,0,0.08);
		}
		h1 {
			margin-top: 0;
			color: #1f2937;
			text-align: center;
		}
		.error {
			color: #dc2626;
			background: #fee2e2;
			padding: 10px;
			border-radius: 8px;
			margin-bottom: 15px;
		}
		input {
			width: 100%;
			padding: 10px;
			margin-bottom: 12px;
			border: 1px solid #d1d5db;
			border-radius: 8px;
			box-sizing: border-box;
		}
		button {
			width: 100%;
			padding: 10px;
			background: #1f2937;
			color: white;
			border: none;
			border-radius: 8px;
			cursor: pointer;
			font-size: 15px;
		}
		button:hover {
			background: #111827;
		}
		.hint {
			margin-top: 15px;
			font-size: 14px;
			color: #4b5563;
			background: #f9fafb;
			padding: 12px;
			border-radius: 8px;
			line-height: 1.5;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Авторизация</h1>

		{{if .Error}}
		<div class="error">{{.Error}}</div>
		{{end}}

		<form method="POST" action="/login">
			<input type="text" name="username" placeholder="Логин">
			<input type="password" name="password" placeholder="Пароль">
			<button type="submit">Войти</button>
		</form>

		<div class="hint">
			<b>Тестовые учётные записи:</b><br>
			admin / admin123<br>
			user / user123
		</div>
	</div>
</body>
</html>

version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: px-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sidecar

  sidecar:
    build:
      context: ..
      dockerfile: docker/sidecar/Dockerfile
    container_name: px-sidecar
    environment:
      PORT: "8090"
      LEGACY_APP_URL: "http://legacy:9000"
      SECURITY_CONTAINER_URL: "http://security:8080/api/check"
      PUBLIC_BASE_URL: "https://company1.example"
    depends_on:
      - security
      - legacy

  security:
    build:
      context: ..
      dockerfile: docker/security/Dockerfile
    container_name: px-security
    ports:
      - "8080:8080"

  legacy:
    build:
      context: ..
      dockerfile: docker/legacy/Dockerfile
    container_name: px-legacy
    ports:
      - "9000:9000"
      